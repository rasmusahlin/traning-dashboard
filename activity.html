<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pass – Träningsdashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav>
  <div class="container nav-inner">
    <span class="nav-brand">Träningsdashboard</span>
    <div class="nav-links">
      <a href="index.html">Översikt</a>
      <a href="analysis.html">Analys</a>
      <a href="upload.html">Ladda upp</a>
      <a href="settings.html">Inställningar</a>
    </div>
  </div>
</nav>

<div class="container">
  <div style="padding-top:1.5rem">
    <a class="back-btn" onclick="history.back()">← Tillbaka</a>
  </div>

  <div id="main-content">
    <div class="empty" style="padding:4rem"><div class="empty-icon">◎</div>Laddar pass...</div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="js/db.js"></script>
<script>
let charts = {};
const actId = new URLSearchParams(location.search).get('id');

async function init() {
  if (!actId) { document.getElementById('main-content').innerHTML = '<div class="empty">Inget pass-ID angivet.</div>'; return; }
  try {
    const [acts, laps, splits] = await Promise.all([
      dbQuery(`activities?id=eq.${actId}`),
      dbQuery(`laps?activity_id=eq.${actId}&order=lap_index.asc`),
      dbQuery(`km_splits?activity_id=eq.${actId}&order=km.asc`)
    ]);
    const act = acts?.[0];
    if (!act) { document.getElementById('main-content').innerHTML = '<div class="empty">Passet hittades inte.</div>'; return; }
    render(act, laps || [], splits || []);
  } catch(e) {
    document.getElementById('main-content').innerHTML = `<div class="empty">Fel: ${e.message}</div>`;
  }
}

function render(act, laps, splits) {
  const isRun = act.activity_type === 'running';
  const pace = act.duration_seconds && act.distance_meters ? fmtPace(act.duration_seconds/(act.distance_meters/1000)) : '–';
  const hrCfg = getHRConfig();

  document.getElementById('main-content').innerHTML = `
    <div class="page-header">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
        <div class="activity-dot ${typeDotClass(act.activity_type)}" style="width:40px;height:40px;font-size:12px">${typeDot(act.activity_type)}</div>
        <div>
          <h1 style="font-size:20px;font-weight:500">${typeLabel(act.activity_type)}</h1>
          <p style="font-size:14px;color:var(--text2)">${fmtDate(act.activity_date)}</p>
        </div>
      </div>
    </div>

    <!-- Summary metrics -->
    <div class="metrics" style="grid-template-columns:repeat(${isRun?5:3},1fr);margin-bottom:1.5rem">
      <div class="metric"><div class="metric-label">Distans</div><div class="metric-value">${act.distance_meters?(act.distance_meters/1000).toFixed(2):'-'}<span class="metric-unit"> km</span></div></div>
      <div class="metric"><div class="metric-label">Tid</div><div class="metric-value" style="font-size:20px">${fmtDuration(act.duration_seconds)}</div></div>
      ${isRun ? `<div class="metric"><div class="metric-label">Snitt pace</div><div class="metric-value" style="font-size:20px">${pace}<span class="metric-unit">/km</span></div></div>` : ''}
      ${act.avg_hr ? `<div class="metric"><div class="metric-label">Snitt HR</div><div class="metric-value">${act.avg_hr}<span class="metric-unit"> bpm</span></div><div class="metric-sub">max ${act.max_hr||'–'} bpm</div></div>` : ''}
      ${act.elevation_gain_meters ? `<div class="metric"><div class="metric-label">Höjdmeter</div><div class="metric-value">+${Math.round(act.elevation_gain_meters)}<span class="metric-unit"> m</span></div></div>` : ''}
    </div>

    <!-- Tabs -->
    <div class="tabs">
      ${isRun ? '<button class="tab-btn active" onclick="switchTab(\'splits\',this)">Km-splits</button>' : ''}
      ${laps.length ? '<button class="tab-btn' + (isRun?'':' active') + '" onclick="switchTab(\'laps\',this)">Laps</button>' : ''}
      ${act.avg_hr ? '<button class="tab-btn" onclick="switchTab(\'zones\',this)">HR-zoner</button>' : ''}
      <button class="tab-btn" onclick="switchTab(\'charts\',this)">Grafer</button>
      <button class="tab-btn" onclick="switchTab(\'info\',this)">Info</button>
    </div>

    <!-- Km-splits tab -->
    ${isRun ? `
    <div id="tab-splits" class="tab-panel active">
      ${splits.length ? renderSplitsTable(splits) : '<div class="empty"><div class="empty-icon">◎</div>Km-splits saknas – dessa genereras när du laddar upp FIT-filen direkt</div>'}
    </div>` : ''}

    <!-- Laps tab -->
    ${laps.length ? `
    <div id="tab-laps" class="tab-panel${isRun?'':' active'}">
      ${renderLapsTable(laps, isRun)}
    </div>` : ''}

    <!-- HR zones tab -->
    ${act.avg_hr ? `
    <div id="tab-zones" class="tab-panel">
      <div class="card">
        <div class="card-header"><span class="card-title">HR-zonsfördelning</span><span style="font-size:12px;color:var(--text3)">Maxpuls: ${hrCfg.max} bpm</span></div>
        <div id="zone-bars">Laddar...</div>
      </div>
    </div>` : ''}

    <!-- Charts tab -->
    <div id="tab-charts" class="tab-panel">
      <div class="card">
        <div class="card-header"><span class="card-title">Pace & elevation</span></div>
        <div style="position:relative;height:220px"><canvas id="chart-pace-elev" role="img" aria-label="Pace och elevation över tid">Laddar...</canvas></div>
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title">Puls över tid</span></div>
        <div style="position:relative;height:180px"><canvas id="chart-hr-time" role="img" aria-label="Puls över tid">Laddar...</canvas></div>
      </div>
      ${isRun&&splits.length ? `
      <div class="card">
        <div class="card-header"><span class="card-title">Pace per km</span></div>
        <div style="position:relative;height:180px"><canvas id="chart-splits" role="img" aria-label="Pace per km">Laddar...</canvas></div>
      </div>` : ''}
    </div>

    <!-- Info tab -->
    <div id="tab-info" class="tab-panel">
      <div class="card">
        <div class="card-header"><span class="card-title">Passdetaljer</span></div>
        <table style="width:100%;font-size:14px;border-collapse:collapse">
          ${[
            ['Datum', fmtDate(act.activity_date)],
            ['Typ', typeLabel(act.activity_type)],
            ['Distans', act.distance_meters ? (act.distance_meters/1000).toFixed(3)+' km' : '–'],
            ['Total tid', fmtDuration(act.duration_seconds)],
            ['Rörlig tid', fmtDuration(act.moving_time_seconds)],
            ['Snitt pace', isRun ? pace+'/km' : '–'],
            ['Snitt HR', act.avg_hr ? act.avg_hr+' bpm' : '–'],
            ['Max HR', act.max_hr ? act.max_hr+' bpm' : '–'],
            ['Snitt kadens', act.avg_cadence ? act.avg_cadence+' spm' : '–'],
            ['Höjdmeter upp', act.elevation_gain_meters ? '+'+Math.round(act.elevation_gain_meters)+' m' : '–'],
            ['Höjdmeter ned', act.elevation_loss_meters ? '-'+Math.round(act.elevation_loss_meters)+' m' : '–'],
            ['Kalorier', act.calories ? act.calories+' kcal' : '–'],
            ['Källa', act.filename || 'Manuell inmatning'],
            ['Notat', act.notes || '–']
          ].map(([k,v])=>`<tr><td style="padding:8px 0;color:var(--text2);width:40%;border-bottom:0.5px solid var(--border)">${k}</td><td style="padding:8px 0;border-bottom:0.5px solid var(--border)">${v}</td></tr>`).join('')}
        </table>
      </div>
    </div>
  `;

  // Render zone bars if HR data exists
  if (act.avg_hr) renderZoneBars(act);

  // Load time series for charts
  loadTimeSeries(act.id, splits);
}

function renderSplitsTable(splits) {
  const paces = splits.map(s => s.pace_sec_per_km).filter(Boolean);
  const minPace = Math.min(...paces);
  const maxPace = Math.max(...paces);
  const paceRange = maxPace - minPace || 1;

  return `<div class="card" style="overflow-x:auto">
    <table class="splits-table">
      <thead><tr>
        <th>Km</th><th>Pace</th><th style="min-width:120px">Visualisering</th>
        <th>HR</th><th>Zon</th><th>Kadens</th><th>Distans</th>
      </tr></thead>
      <tbody>
        ${splits.map(s => {
          const z = s.avg_hr ? hrZone(s.avg_hr) : null;
          const barPct = s.pace_sec_per_km ? Math.round(((maxPace - s.pace_sec_per_km) / paceRange) * 100) : 0;
          const partial = s.partial ? `<span style="font-size:10px;color:var(--text3)"> (del)</span>` : '';
          return `<tr>
            <td><strong>${s.km}</strong>${partial}</td>
            <td><strong>${fmtPace(s.pace_sec_per_km)}</strong>/km</td>
            <td><div class="pace-bar"><div class="pace-bar-fill" style="width:${barPct}%"></div></div></td>
            <td>${s.avg_hr ? s.avg_hr+' bpm' : '–'}</td>
            <td>${z ? `<span class="zone-badge z${z.num}">Z${z.num}</span>` : '–'}</td>
            <td>${s.avg_cadence ? s.avg_cadence+' spm' : '–'}</td>
            <td style="color:var(--text2)">${(s.distance_meters/1000).toFixed(3)} km</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>`;
}

function renderLapsTable(laps, isRun) {
  return `<div class="card" style="overflow-x:auto">
    <table class="splits-table">
      <thead><tr>
        <th>Lap</th><th>Distans</th><th>Tid</th>
        ${isRun ? '<th>Pace</th>' : ''}
        <th>HR</th><th>Zon</th><th>Kadens</th>
      </tr></thead>
      <tbody>
        ${laps.map(l => {
          const z = l.avg_hr ? hrZone(l.avg_hr) : null;
          return `<tr>
            <td><strong>${l.lap_index}</strong></td>
            <td>${(l.distance_meters/1000).toFixed(3)} km</td>
            <td>${fmtDuration(l.duration_seconds)}</td>
            ${isRun ? `<td><strong>${fmtPace(l.avg_pace_sec_per_km)}</strong>/km</td>` : ''}
            <td>${l.avg_hr ? l.avg_hr+' bpm' : '–'}</td>
            <td>${z ? `<span class="zone-badge z${z.num}">Z${z.num}</span>` : '–'}</td>
            <td>${l.avg_cadence ? l.avg_cadence+' spm' : '–'}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>`;
}

function renderZoneBars(act) {
  const { zones, max } = getHRConfig();
  // Approximate zone time from laps or splits if available
  const el = document.getElementById('zone-bars');
  if (!el) return;
  // Show static zone reference with avg HR marker
  const avgHR = act.avg_hr || 0;
  el.innerHTML = zones.map(z => {
    const inZone = avgHR >= z.min && avgHR < z.max;
    return `<div class="zone-row">
      <div class="zone-label"><span class="zone-badge z${z.num}">Z${z.num}</span></div>
      <div style="flex:1">
        <div style="font-size:12px;color:var(--text2);margin-bottom:3px">${z.name} · ${Math.round(z.min)}–${z.max===Infinity?max:Math.round(z.max)} bpm</div>
        <div class="zone-bar-wrap"><div class="zone-bar-inner" style="width:${inZone?'60':'15'}%;background:${z.color}"></div></div>
      </div>
      ${inZone ? `<span style="font-size:12px;color:var(--text2)">snitt ${avgHR} bpm</span>` : '<span></span>'}
    </div>`;
  }).join('') + `<p style="font-size:12px;color:var(--text3);margin-top:1rem">Exakt zonstid kräver per-sekund-data från FIT-fil. Ovan visar var ditt snitt-HR hamnar.</p>`;
}

async function loadTimeSeries(actId, splits) {
  try {
    const ts = await dbQuery(`time_series?activity_id=eq.${actId}&order=t.asc`);
    if (ts && ts.length) renderTimeSeriesCharts(ts, splits);
  } catch(e) { console.log('No time series data', e); }
}

function renderTimeSeriesCharts(ts, splits) {
  Object.values(charts).forEach(c => c.destroy());
  charts = {};

  const labels = ts.map(p => fmtDuration(p.t));
  const alt = ts.map(p => p.alt).filter(Boolean);
  const hasAlt = alt.length > ts.length * 0.5;
  const hasSpeed = ts.some(p => p.speed);
  const hasHR = ts.some(p => p.hr);

  // Pace + elevation chart
  const paceElev = document.getElementById('chart-pace-elev');
  if (paceElev) {
    const datasets = [];
    if (hasSpeed) datasets.push({
      label: 'Pace (sek/km)',
      data: ts.map(p => p.speed ? +(1000/p.speed).toFixed(1) : null),
      borderColor: '#1d9e75', backgroundColor: 'rgba(29,158,117,0.07)',
      yAxisID: 'yPace', tension: 0.2, pointRadius: 0, fill: true, spanGaps: true
    });
    if (hasAlt) datasets.push({
      label: 'Elevation (m)',
      data: ts.map(p => p.alt ? +p.alt.toFixed(1) : null),
      borderColor: '#ba7517', backgroundColor: 'rgba(186,117,23,0.15)',
      yAxisID: 'yAlt', tension: 0.3, pointRadius: 0, fill: true, spanGaps: true
    });
    if (datasets.length) {
      charts.paceElev = new Chart(paceElev, {
        type: 'line',
        data: { labels, datasets },
        options: {
          responsive: true, maintainAspectRatio: false, animation: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { grid:{display:false}, ticks:{font:{size:10},maxTicksLimit:8} },
            yPace: { position:'left', reverse:true, grid:{color:'rgba(128,128,128,0.08)'}, ticks:{font:{size:10},callback:v=>fmtPace(v)} },
            yAlt: { position:'right', grid:{display:false}, ticks:{font:{size:10}} }
          }
        }
      });
    }
  }

  // HR over time
  const hrTime = document.getElementById('chart-hr-time');
  if (hrTime && hasHR) {
    const { zones } = getHRConfig();
    charts.hrTime = new Chart(hrTime, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label: 'HR',
          data: ts.map(p => p.hr || null),
          borderColor: '#d85a30', backgroundColor: 'rgba(216,90,48,0.08)',
          tension: 0.2, pointRadius: 0, fill: true, spanGaps: true
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false, animation: false,
        plugins: { legend:{display:false}, annotation:{} },
        scales: {
          x: { grid:{display:false}, ticks:{font:{size:10},maxTicksLimit:8} },
          y: { grid:{color:'rgba(128,128,128,0.08)'}, ticks:{font:{size:10}} }
        }
      }
    });
  }

  // Splits bar chart
  const splitsChart = document.getElementById('chart-splits');
  if (splitsChart && splits.length) {
    charts.splits = new Chart(splitsChart, {
      type: 'bar',
      data: {
        labels: splits.map(s => `${s.km} km`),
        datasets: [{
          label: 'Pace',
          data: splits.map(s => s.pace_sec_per_km ? +s.pace_sec_per_km.toFixed(1) : null),
          backgroundColor: splits.map(s => {
            if (!s.avg_hr) return '#185FA5';
            const z = hrZone(s.avg_hr);
            return z.color;
          }),
          borderRadius: 4
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend:{display:false}, tooltip:{callbacks:{label:v=>`${fmtPace(v.raw)}/km`}} },
        scales: {
          y: { reverse:true, grid:{color:'rgba(128,128,128,0.08)'}, ticks:{font:{size:11},callback:v=>fmtPace(v)} },
          x: { grid:{display:false}, ticks:{font:{size:11}} }
        }
      }
    });
  }
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  const panel = document.getElementById('tab-' + name);
  if (panel) panel.classList.add('active');
}

init();
</script>
</body>
</html>
